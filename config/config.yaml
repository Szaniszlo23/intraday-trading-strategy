# ---------------------------------------------------------------
# Intraday Momentum Strategy — Parameters
#
# API credentials are NOT stored here.
# Set ALPACA_API_KEY and ALPACA_SECRET_KEY in your .env file
# (see .env.example) or as host environment variables.
# ---------------------------------------------------------------

strategy:
  # Signal construction
  band_mult: 1.0          # Noise-band multiplier
  trade_freq: 30          # Minutes between signal evaluations (baseline only)

  # Position sizing
  sizing_type: "vol_target"  # "vol_target" | "full_notional"
  target_vol: 0.02        # Daily target volatility
  max_leverage: 4.0       # Maximum leverage cap

  # Execution & costs
  aum_0: 100000.0
  commission: 0.0035
  min_comm: 0.35
  slippage: 0.001             # One-way slippage per share ($) — from paper assumption

  # Universe
  symbol: "SPY"
  vol_window: 14
